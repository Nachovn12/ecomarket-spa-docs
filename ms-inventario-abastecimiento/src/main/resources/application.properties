spring.application.name=ms-inventario-abastecimiento
server.port=8085

spring.datasource.url=${INVENTARIO_DB_URL:jdbc:mysql://localhost:3306/bd_inventario}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# HATEOAS - Configuracion de SpringDoc con Swagger UI
# Los links HATEOAS se incluyen automaticamente en las respuestas con EntityModel y CollectionModel
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
# Cambiar la ruta del JSON con la especificacion OpenAPI (Por defecto: /v3/api-docs)
springdoc.api-docs.path=/api-docs

# Ordenar los endpoints alfabeticamente en la UI
springdoc.swagger-ui.operationsSorter=alpha

# HATEOAS - Desabilitar auto-configuracion de HATEOAS en SpringDoc para evitar conflictos
springdoc.springdoc-hateoas-enabled=false

# URLs de microservicios relacionados (comunicacion REST inter-MS)
ms.catalogo.url=http://localhost:8084
