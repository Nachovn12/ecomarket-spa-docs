# Puerto del servidor
server.port=8087
spring.application.name=ms-logistica-envios

# Configuración de Base de Datos MySQL (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/bd_logistica?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
